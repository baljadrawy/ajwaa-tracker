# ============================================================
#  Ajwaa Tracker — Docker Compose للإنتاج
#  الاستخدام: docker compose -f docker-compose.prod.yml up -d
# ============================================================

services:

  postgres:
    image: postgres:16-alpine
    container_name: ajwaa-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-ajwaa_db}
      POSTGRES_USER: ${DB_USER:-ajwaa}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - ajwaa-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-ajwaa} -d ${DB_NAME:-ajwaa_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: '2.0'
        reservations:
          memory: 512m
          cpus: '0.5'
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ajwaa-backend
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-4000}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-ajwaa_db}
      DB_USER: ${DB_USER:-ajwaa}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
    volumes:
      - ./uploads:/app/uploads
    networks:
      - ajwaa-net
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 3g
          cpus: '3.0'
        reservations:
          memory: 512m
          cpus: '0.5'
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ajwaa-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - ajwaa-net
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '1.0'
        reservations:
          memory: 128m
          cpus: '0.25'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  ajwaa-net:
    driver: bridge
